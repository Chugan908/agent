<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-slate-800 rounded-3xl shadow-2xl p-8 border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-6">SkyCast Weather</h1>
        
        <div class="flex gap-2 mb-8">
            <input type="text" id="cityInput" placeholder="Enter city name..." 
                class="flex-1 bg-slate-700 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button id="searchBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-medium transition-colors">
                Search
            </button>
        </div>

        <div id="weatherDisplay" class="hidden text-center animate-in fade-in zoom-in duration-300">
            <h2 id="cityName" class="text-3xl font-bold mb-1"></h2>
            <p id="description" class="text-slate-400 capitalize mb-4"></p>
            
            <div class="flex justify-center items-center mb-4">
                <img id="weatherIcon" src="" alt="Weather Icon" class="w-24 h-24">
                <span id="temp" class="text-6xl font-extrabold tracking-tighter"></span>
            </div>

            <div class="grid grid-cols-2 gap-4 mt-6 border-t border-slate-700 pt-6">
                <div class="bg-slate-700/50 p-3 rounded-2xl">
                    <p class="text-xs text-slate-400 uppercase font-semibold"></p>
                    <p id="humidity" class="text-lg font-bold"></p>
                </div>
                <div class="bg-slate-700/50 p-3 rounded-2xl">
                    <p class="text-xs text-slate-400 uppercase font-semibold"></p>
                    <p id="wind" class="text-lg font-bold"></p>
                </div>
            </div>
        </div>

        <p id="message" class="text-center text-slate-400 mt-4 hidden"></p>
    </div>

    <script>
        const API_KEY = 'bd085be0097d6297fa7669db8d463241'; 
        const searchBtn = document.getElementById('searchBtn');
        const cityInput = document.getElementById('cityInput');
        const weatherDisplay = document.getElementById('weatherDisplay');
        const message = document.getElementById('message');

        async function getWeather() {
            const city = cityInput.value.trim();
            if (!city) return;

            message.textContent = "Fetching weather...";
            message.classList.remove('hidden');
            weatherDisplay.classList.add('hidden');

            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`
                );

                if (!response.ok) throw new Error("City not found");

                const data = await response.json();
                updateUI(data);
            } catch (err) {
                message.textContent = "❌ " + err.message;
            }
        }

        function updateUI(data) {
            message.classList.add('hidden');
            weatherDisplay.classList.remove('hidden');

            document.getElementById('cityName').textContent = data.name;
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('temp').textContent = `${Math.round(data.main.temp)}°C`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('wind').textContent = `${data.wind.speed} m/s`;
            
            const iconCode = data.weather[0].icon;
            document.getElementById('weatherIcon').src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;
        }

        searchBtn.addEventListener('click', getWeather);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });
    </script>
</body>
</html>
