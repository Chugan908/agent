<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed { text-decoration: line-through; opacity: 0.5; filter: grayscale(1); }
        .urgent-pulse { border: 2px solid #ef4444; animation: pulse 2s infinite; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0   rgba(239, 68, 68, 0.4); }
            70%  { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0);   }
            100% { box-shadow: 0 0 0 0   rgba(239, 68, 68, 0);   }
        }
    </style>
    {# Expose CSRF token and username to the JS layer #}
    <script>
        const CSRF_TOKEN = "{{ csrf_token }}";
        const CURRENT_USER = "{{ username }}";
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-2xl mx-auto text-left">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-indigo-600 tracking-tight">MY TASKS 🚀</h1>
                <p id="stats" class="text-slate-500 font-medium text-sm">Loading stats...</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-sm text-slate-500 font-semibold hidden sm:block">👋 {{ username }}</span>
                <button onclick="clearCompleted()" class="text-xs bg-slate-200 hover:bg-red-100 hover:text-red-600 text-slate-500 px-3 py-2 rounded-lg transition font-bold uppercase">
                    Clear Done
                </button>
                <a href="{% url 'logout' %}" class="text-xs bg-indigo-100 hover:bg-indigo-200 text-indigo-600 px-3 py-2 rounded-lg transition font-bold uppercase">
                    Logout
                </a>
            </div>
        </header>

        <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/60 mb-8 border border-slate-100">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="taskInput" placeholder="What needs to be done?"
                    class="p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-medium">

                <select id="subjectInput" class="p-4 bg-slate-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400 font-medium text-slate-600">
                    <option value="Math">📐 Math</option>
                    <option value="Science">🔬 Science</option>
                    <option value="English">🇬🇧 English</option>
                    <option value="History">📜 History</option>
                    <option value="Art">🎨 Art</option>
                    <option value="Other">✨ Other</option>
                </select>

                <div class="flex gap-2 md:col-span-2 items-center">
                    <input type="date" id="dateInput"
                        class="p-4 bg-slate-50 border-none rounded-2xl flex-grow outline-none focus:ring-2 focus:ring-indigo-400 font-medium text-slate-600">

                    <label class="flex items-center gap-2 cursor-pointer bg-slate-50 p-4 rounded-2xl hover:bg-red-50 transition">
                        <input type="checkbox" id="urgentInput" class="w-5 h-5 accent-red-500">
                        <span class="text-sm font-bold text-slate-600">URGENT</span>
                    </label>

                    <button onclick="addTask()" class="bg-indigo-600 text-white h-full px-8 rounded-2xl font-black hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 active:scale-95">
                        ADD
                    </button>
                </div>
            </div>
        </div>

        <div class="flex gap-4 mb-6 text-sm font-bold uppercase tracking-wider overflow-x-auto pb-2">
            <button onclick="setFilter('all')"       class="filter-btn text-indigo-600 border-b-2 border-indigo-600 pb-1" id="filter-all">All</button>
            <button onclick="setFilter('active')"    class="filter-btn text-slate-400 hover:text-indigo-400 transition"   id="filter-active">Active</button>
            <button onclick="setFilter('completed')" class="filter-btn text-slate-400 hover:text-indigo-400 transition"   id="filter-completed">Done</button>
        </div>

        <div id="homeworkList" class="space-y-4 mb-8 text-left"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
